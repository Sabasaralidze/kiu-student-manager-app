<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" font-family="Arial, sans-serif">
  <title>MVC Architecture - KIU Student Task Manager</title>
  <rect width="920" height="340" fill="#f8fafc"/>
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">MVC Architecture</text>

  <rect x="30" y="60" width="110" height="50" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="85" y="90" text-anchor="middle" font-size="14" fill="#1e3a5f">User / Browser</text>

  <rect x="180" y="60" width="100" height="50" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="230" y="90" text-anchor="middle" font-size="13" fill="#1e3a5f">Routes</text>

  <rect x="320" y="60" width="130" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="385" y="82" text-anchor="middle" font-size="13" fill="#1e3a5f">Controllers</text>
  <text x="385" y="98" text-anchor="middle" font-size="10" fill="#64748b">Task, Project, API</text>

  <rect x="490" y="60" width="100" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-size="13" fill="#1e3a5f">Models</text>

  <rect x="630" y="60" width="110" height="50" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="685" y="90" text-anchor="middle" font-size="13" fill="#1e3a5f">Blade Views</text>

  <rect x="780" y="60" width="110" height="50" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="835" y="90" text-anchor="middle" font-size="13" fill="#1e3a5f">JSON API</text>

  <polygon points="140,85 170,85 170,80 180,90 170,100 170,95 140,95" fill="#64748b"/>
  <polygon points="280,85 310,85 310,80 320,90 310,100 310,95 280,95" fill="#64748b"/>
  <polygon points="450,85 480,85 480,80 490,90 480,100 480,95 450,95" fill="#64748b"/>
  <polygon points="590,85 620,85 620,80 630,90 620,100 620,95 590,95" fill="#64748b"/>

  <line x1="385" y1="110" x2="385" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="540" y1="110" x2="540" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="385" y1="140" x2="540" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="540" y1="140" x2="540" y2="160" stroke="#64748b" stroke-width="2"/>

  <rect x="470" y="160" width="140" height="44" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="540" y="187" text-anchor="middle" font-size="13" fill="#1e3a5f">SQLite Database</text>

  <rect x="320" y="230" width="120" height="44" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="380" y="257" text-anchor="middle" font-size="12" fill="#1e3a5f">Policies</text>

  <rect x="480" y="230" width="140" height="44" rx="8" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="550" y="257" text-anchor="middle" font-size="12" fill="#1e3a5f">File Storage</text>

  <line x1="385" y1="110" x2="380" y2="230" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="540" y1="204" x2="550" y2="230" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="685" y1="110" x2="85" y2="110" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="460" y="320" text-anchor="middle" font-size="11" fill="#64748b">Request flow: Browser ’ Routes ’ Controller ’ Model ’ Database / View or JSON</text>
</svg>
