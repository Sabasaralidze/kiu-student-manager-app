<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <title>ER Diagram - KIU Student Task Manager</title>
  <rect width="900" height="520" fill="#f8fafc"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">Entity-Relationship Diagram</text>

  <rect x="340" y="50" width="220" height="88" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">users</text>
  <text x="350" y="92" font-size="11" fill="#334155">id PK</text>
  <text x="350" y="108" font-size="11" fill="#334155">name, email, password</text>

  <rect x="60" y="200" width="200" height="88" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">student_profiles</text>
  <text x="70" y="242" font-size="11" fill="#334155">id PK, user_id FK UK</text>
  <text x="70" y="258" font-size="11" fill="#334155">student_id, faculty, phone</text>

  <rect x="350" y="200" width="200" height="100" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">tasks</text>
  <text x="360" y="242" font-size="11" fill="#334155">id PK, user_id FK</text>
  <text x="360" y="258" font-size="11" fill="#334155">title, description, subject</text>
  <text x="360" y="274" font-size="11" fill="#334155">status, deadline</text>

  <rect x="640" y="200" width="200" height="100" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="740" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">projects</text>
  <text x="650" y="242" font-size="11" fill="#334155">id PK, user_id FK</text>
  <text x="650" y="258" font-size="11" fill="#334155">title, description, subject</text>
  <text x="650" y="274" font-size="11" fill="#334155">status, deadline</text>

  <rect x="350" y="380" width="200" height="88" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">attachments</text>
  <text x="360" y="422" font-size="11" fill="#334155">id PK, task_id FK</text>
  <text x="360" y="438" font-size="11" fill="#334155">original_name, path, size</text>

  <rect x="640" y="380" width="200" height="88" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="740" y="402" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">project_user</text>
  <text x="650" y="422" font-size="11" fill="#334155">project_id FK, user_id FK</text>
  <text x="650" y="438" font-size="11" fill="#334155">role (owner / member)</text>

  <line x1="400" y1="138" x2="200" y2="200" stroke="#64748b" stroke-width="2"/>
  <text x="270" y="165" font-size="11" fill="#475569">1 : 1</text>

  <line x1="450" y1="138" x2="450" y2="200" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="175" font-size="11" fill="#475569">1 : N</text>

  <line x1="500" y1="138" x2="700" y2="200" stroke="#64748b" stroke-width="2"/>
  <text x="610" y="175" font-size="11" fill="#475569">1 : N</text>

  <line x1="450" y1="300" x2="450" y2="380" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="345" font-size="11" fill="#475569">1 : N</text>

  <line x1="740" y1="300" x2="740" y2="380" stroke="#64748b" stroke-width="2"/>
  <text x="750" y="345" font-size="11" fill="#475569">N : M</text>
  <line x1="560" y1="138" x2="680" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="450" y1="138" x2="680" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#64748b">Pivot table project_user links users and projects (Many-to-Many)</text>
</svg>
